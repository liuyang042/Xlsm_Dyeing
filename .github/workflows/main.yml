name: Sync to Gitee

on:
  push:
    branches: [ main ]   # 改成你自己的默认分支（main 或 master）
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出完整仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 拉取所有历史，确保推送完整

      - name: 推送到 Gitee
        run: |
          git remote add gitee https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_TOKEN }}@gitee.com/liuyang042/Xlsm_Dyeing.git
          git push gitee --force --all
          git push gitee --force --tags
